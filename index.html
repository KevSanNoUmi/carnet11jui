h1 { font-size:19px; margin:0; font-weight:600; }

.mapcard { padding:6px; }
.card h2 { font-size:17px; margin:0; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.eico { display:inline-block; line-height:1; }
.tag { font-size:10px; letter-spacing:.08em; padding:3px 8px; border-radius:6px; font-weight:700; }
.tag.pro { background:rgba(127,176,238,.18); color:var(--blue); }
.tag.perso { background:rgba(86,199,154,.18); color:var(--green); }
.tag.archive { background:rgba(138,147,173,.18); color:var(--mut); }
.dates { color:var(--gold); font-size:13px; margin:6px 0 8px; font-weight:600; }
.brief { font-size:13.5px; line-height:1.5; margin:6px 0; }
.sec { background:linear-gradient(135deg, #E8C46E 0%, #C99A42 100%); color:#2A1E0A; margin:14px -14px 10px -14px; padding:8px 14px; font-size:11px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; box-shadow:0 3px 10px -3px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.35); }
.sec .cnt { color:#000; opacity:1; font-weight:700; text-transform:none; letter-spacing:0; }
.card { overflow:hidden; }
label.f { display:block; font-size:11px; color:var(--mut); letter-spacing:.06em; text-transform:uppercase; margin:12px 0 4px; }
textarea, input.f, select.f { width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--txt); padding:9px 10px; font-size:14px; font-family:inherit; outline:none; resize:vertical; }
.hotellink { display:inline-block; margin-top:7px; color:var(--green); font-size:13.5px; text-decoration:none; font-weight:600; }
.train { display:flex; gap:10px; align-items:flex-start; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px; margin:8px 0; }
.train .badge { flex:0 0 auto; background:var(--blue); color:#0E1526; font-weight:700; font-size:12.5px; padding:5px 10px; border-radius:7px; margin-top:1px; }
.train.critique .badge { background:var(--red); color:#fff; }
.train .tr { font-size:14px; font-weight:600; line-height:1.35; }
.train .tn { font-size:12.5px; color:var(--mut); margin-top:2px; line-height:1.4; }
.navibtn { display:block; text-align:center; margin-top:10px; background:linear-gradient(160deg, #274877, #1A3057); border:1px solid #4A7AB8; color:#8FC0FF; border-radius:9px; padding:10px; font-size:13.5px; text-decoration:none; font-weight:600; box-shadow:0 2px 8px -2px rgba(0,0,0,.4); }
.taq { border-left:3px solid var(--gold); padding:8px 10px; margin:8px 0; background:var(--panel2); border-radius:0 10px 10px 0; }
.taq .route { font-weight:700; font-size:14px; }
.taq .d { font-size:12.5px; color:var(--mut); margin:3px 0; }
.taq .d b { color:var(--gold); font-weight:600; }
.taq .chk { display:flex; gap:16px; margin-top:6px; font-size:13px; align-items:center; flex-wrap:wrap; }
.taq .chk label { display:flex; gap:6px; align-items:center; }

function tideAt(port, dateMs){
  const p=TIDE_PORTS[port]; if(!p) return 0;
  const t=(dateMs-T_REF)/3600000;
  return p.M2*Math.cos(2*Math.PI*(t-p.phi)/12.4206)
       + p.S2*Math.cos(2*Math.PI*(t-p.phi)/12.0000)
       + p.K1*Math.cos(2*Math.PI*(t-p.phi*0.5)/23.9345)
       + p.O1*Math.cos(2*Math.PI*(t-p.phi*0.5)/25.8193);
}
function tideDay(port, dayStartMs){
  const pts=[];
  for(let m=-60; m<=24*60+60; m+=5) pts.push({h:m/60, y:tideAt(port, dayStartMs+m*60000)});
  const ex=[];
  for(let i=1;i<pts.length-1;i++){
    const dy1=pts[i].y-pts[i-1].y, dy2=pts[i+1].y-pts[i].y;
    if(dy1*dy2<0 && pts[i].h>=0 && pts[i].h<=24) ex.push({t:pts[i].h,y:pts[i].y,type:dy1>0?'HW':'LW'});
  }
  const inDay = pts.filter(p=>p.h>=0 && p.h<=24);
  const yMin = Math.min(...inDay.map(p=>p.y)), yMax=Math.max(...inDay.map(p=>p.y));
  return {pts:inDay, extremes:ex, range:yMax-yMin, yMin, yMax};
}
function tideCoefficient(port, range){
  const p=TIDE_PORTS[port]; if(!p) return null;
  const springRange=2*(p.M2+p.S2), neapRange=2*Math.abs(p.M2-p.S2);
  const rel=Math.max(0,Math.min(1,(range-neapRange)/(springRange-neapRange)));
  return Math.round(20+rel*100);
}
function sunTimes(dateMs, lat, lng){
  const d=new Date(dateMs);
  const N=Math.floor((Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate())-Date.UTC(d.getUTCFullYear(),0,0))/86400000);
  const rad=Math.PI/180;
  const gamma=2*Math.PI/365*(N-1);
  const eqTime=229.18*(0.000075+0.001868*Math.cos(gamma)-0.032077*Math.sin(gamma)-0.014615*Math.cos(2*gamma)-0.040849*Math.sin(2*gamma));
  const decl=0.006918-0.399912*Math.cos(gamma)+0.070257*Math.sin(gamma)-0.006758*Math.cos(2*gamma)+0.000907*Math.sin(2*gamma)-0.002697*Math.cos(3*gamma)+0.00148*Math.sin(3*gamma);
  const cH=(Math.cos(90.833*rad)-Math.sin(lat*rad)*Math.sin(decl))/(Math.cos(lat*rad)*Math.cos(decl));
  if(Math.abs(cH)>1) return {sunrise:null,sunset:null};
  const H=Math.acos(cH)/rad;
  return {sunrise:((720-4*(lng+H)-eqTime+9*60)/60+24)%24, sunset:((720-4*(lng-H)-eqTime+9*60)/60+24)%24};
}

    const mid=(a.t+b.t)/2, span=b.t-a.t;
    if(a.type==='LW' && b.type==='HW') risingWindows.push({from:a.t+span*0.2, to:b.t-span*0.1, peak:mid});
    if(a.type==='HW' && b.type==='LW') fallingWindows.push({from:a.t+span*0.2, to:b.t-span*0.1, peak:mid});
  }
  function pickWithin(list, t){ return list.find(w=>t>=w.from-1 && t<=w.to+1); }
  const sr=sun.sunrise, ss=sun.sunset;
  for(const sp of species){
    if(sp==='Suzuki' && ss!=null){ const r=pickWithin(risingWindows,ss)||risingWindows[0]; if(r) w.push({esp:'Suzuki', from:ss, to:Math.min(ss+3.5,r.to+0.5), why:'crépuscule + montante'}); }
    if(sp==='Aji' && ss!=null) w.push({esp:'Aji', from:(ss+1.5)%24, to:(ss+5.5)%24, why:'nuit, entrées de port'});
    if(sp==='Mebaru' && ss!=null) w.push({esp:'Mebaru', from:(ss+1)%24, to:(ss+5)%24, why:'nuit, points lumineux'});
    if(sp==='Tachiuo' && ss!=null) w.push({esp:'Tachiuo', from:(ss-0.5+24)%24, to:(ss+2.5)%24, why:'rush 18-19h + wind nuit'});
    if(sp==='Aori-Ika'){
      if(sr!=null) w.push({esp:'Aori-Ika', from:(sr-0.5+24)%24, to:(sr+1.5)%24, why:'aube, marée qui bouge'});
      if(ss!=null) w.push({esp:'Aori-Ika', from:(ss-0.5+24)%24, to:(ss+1)%24, why:'crépuscule'});
    }
    if(sp==='Kurodai' && sr!=null){ const r=pickWithin(risingWindows,sr)||risingWindows[0]; if(r) w.push({esp:'Kurodai', from:Math.max(sr-0.5,r.from-0.3), to:Math.min(sr+2,r.to+0.5), why:'aube + montante'}); }
    if(sp==='Hirame' && sr!=null){ const f=pickWithin(fallingWindows,sr)||fallingWindows[0]; if(f) w.push({esp:'Hirame', from:Math.max(sr-1,f.from-0.5), to:Math.min(sr+2.5,f.to+0.5), why:'aube + début descendante'}); }
    if(sp==='Saba'){ if(sr!=null) w.push({esp:'Saba', from:(sr-0.3+24)%24, to:sr+1.5, why:'aube, chasse en surface'}); }
  }
  return w;
}

function tideChartSVG(day, sun, windows, port){
  const W=340, H=140, PAD_L=8, PAD_R=8, PAD_T=14, PAD_B=22;
  const chartW=W-PAD_L-PAD_R, chartH=H-PAD_T-PAD_B;
  const yMin=day.yMin-0.15, yMax=day.yMax+0.15;
  const yScale = h => PAD_T + (yMax-h)/(yMax-yMin)*chartH;
  const xScale = t => PAD_L + (t/24)*chartW;
  const gid = 'tg'+(tideChartSVG._n=(tideChartSVG._n||0)+1);

  // grille horaire
  let grid='';
  for(let h=0;h<=24;h+=6){
    const x=xScale(h);
    grid += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${PAD_T+chartH}" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 3" opacity=".5"/>`;
    grid += `<text x="${x}" y="${H-8}" text-anchor="middle" font-family="'Zen Kaku Gothic New',sans-serif" font-size="9.5" fill="var(--mut)">${String(h).padStart(2,'0')}h</text>`;
  }
  // ligne zéro
  const y0=yScale(0);
  grid += `<line x1="${PAD_L}" y1="${y0}" x2="${PAD_L+chartW}" y2="${y0}" stroke="var(--mut)" stroke-width="1" stroke-dasharray="3 3" opacity=".35"/>`;

  // jour / nuit (bandes)
  let daynight='';
  if(sun.sunrise!=null && sun.sunset!=null){
    daynight += `<rect x="${PAD_L}" y="${PAD_T}" width="${xScale(sun.sunrise)-PAD_L}" height="${chartH}" fill="#0B1A2E" opacity=".38"/>`;
    daynight += `<rect x="${xScale(sun.sunset)}" y="${PAD_T}" width="${PAD_L+chartW-xScale(sun.sunset)}" height="${chartH}" fill="#0B1A2E" opacity=".38"/>`;
  }

  // fenêtres de pêche : bandes discrètes en haut
  const nWin = windows.length;
  const bandH = Math.min(3.5, (chartH-4)/Math.max(nWin,1)/2.5);
  const winBands = windows.map((w,i)=>{
    const y = PAD_T + 3 + i*(bandH+1.6);
    if(w.from > w.to){
      // wraparound (traverse minuit) → 2 segments
      return `<rect x="${xScale(w.from)}" y="${y}" width="${xScale(24)-xScale(w.from)}" height="${bandH}" rx="1" fill="#D9A441" opacity=".55"/>
              <rect x="${xScale(0)}" y="${y}" width="${xScale(w.to)-xScale(0)}" height="${bandH}" rx="1" fill="#D9A441" opacity=".55"/>`;
    }
    return `<rect x="${xScale(w.from)}" y="${y}" width="${Math.max(2,xScale(w.to)-xScale(w.from))}" height="${bandH}" rx="1" fill="#D9A441" opacity=".55"/>`;
  }).join('');

  // courbe
  const pathData = day.pts.map((p,i)=>(i===0?'M':'L')+xScale(p.h).toFixed(1)+','+yScale(p.y).toFixed(1)).join(' ');
  const areaData = pathData + ' L' + xScale(24).toFixed(1) + ',' + (PAD_T+chartH) + ' L' + PAD_L + ',' + (PAD_T+chartH) + ' Z';

  // marqueurs HW/LW
  const marks = day.extremes.map(e=>{
    const cx=xScale(e.t), cy=yScale(e.y);
    const label = e.type==='HW'?'↑':'↓';
    const yTxt = e.type==='HW' ? cy-8 : cy+13;
    return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.2" fill="#EFE6D3" stroke="#D9A441" stroke-width="1.5"/>
            <text x="${cx.toFixed(1)}" y="${yTxt}" text-anchor="middle" font-family="'Zen Kaku Gothic New',sans-serif" font-size="9.5" font-weight="700" fill="#EFE6D3">${label} ${fmtH(e.t)}</text>`;
  }).join('');

  // soleil / crépuscule
  let sunMarks='';
  if(sun.sunrise!=null){
    const x=xScale(sun.sunrise);
    sunMarks += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${PAD_T+chartH}" stroke="#F2B84D" stroke-width="1.2" stroke-dasharray="2 2" opacity=".8"/>
      <text x="${x}" y="${PAD_T+chartH-2}" text-anchor="middle" font-size="9" fill="#F2B84D" font-weight="700">☀ ${fmtH(sun.sunrise)}</text>`;
  }
  if(sun.sunset!=null){
    const x=xScale(sun.sunset);
    sunMarks += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${PAD_T+chartH}" stroke="#7D8DAB" stroke-width="1.2" stroke-dasharray="2 2" opacity=".8"/>
      <text x="${x}" y="${PAD_T+chartH-2}" text-anchor="middle" font-size="9" fill="#9FB0C8" font-weight="700">🌙 ${fmtH(sun.sunset)}</text>`;
  }

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="display:block;width:100%">
    <defs>
      <linearGradient id="${gid}fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3E6FA8" stop-opacity=".55"/><stop offset="100%" stop-color="#1D3E6E" stop-opacity=".1"/></linearGradient>
    </defs>
    <rect x="0" y="0" width="${W}" height="${H}" fill="var(--panel2)"/>
    ${daynight}
    ${grid}
    ${winBands}
    <path d="${areaData}" fill="url(#${gid}fill)"/>
    <path d="${pathData}" fill="none" stroke="#8FC0FF" stroke-width="1.8"/>
    ${marks}
    ${sunMarks}
  </svg>`;
}

function tideWidget(destCode, dateStr){
  const info = DEST_FISH[destCode]; if(!info) return '';
  const port = info.port;
  const dates = info.dates.slice();
  if(!dateStr) dateStr = view.tideDate?.[destCode] || dates[0];
  const idx = dates.indexOf(dateStr);
  const prev = idx>0 ? dates[idx-1] : null;
  const next = idx<dates.length-1 && idx>=0 ? dates[idx+1] : null;
  const dayStartMs = new Date(dateStr+'T00:00:00+09:00').getTime();
  const day = tideDay(port, dayStartMs);
  const p = TIDE_PORTS[port];
  const sun = sunTimes(dayStartMs, p.lat, p.lng);
  const coef = tideCoefficient(port, day.range);
  const windows = fishingWindows(info.species, sun, day.extremes);
  const dateLabel = new Date(dateStr).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

  const nav = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    ${prev?`<button class="nbtn" onclick="setTideDate('${destCode}','${prev}')" style="font-size:15px">◀</button>`:'<span style="width:24px"></span>'}
    <div style="text-align:center"><div style="font-family:'Shippori Mincho',serif;font-size:14.5px;font-weight:700">${dateLabel}</div><div style="color:var(--mut);font-size:11.5px">${p.name} · coef ${coef} <span style="color:${coefColor(coef)}">${coefLabel(coef)}</span></div></div>
    ${next?`<button class="nbtn" onclick="setTideDate('${destCode}','${next}')" style="font-size:15px">▶</button>`:'<span style="width:24px"></span>'}
  </div>`;

  const chart = tideChartSVG(day, sun, windows, port);
  const facts = `<div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:8px;font-size:12px">
    ${day.extremes.filter(e=>e.type==='HW').map(e=>`<span style="color:var(--txt)"><b style="color:#8FC0FF">↑ ${fmtH(e.t)}</b> · ${e.y.toFixed(1)}m</span>`).join('')}
    ${day.extremes.filter(e=>e.type==='LW').map(e=>`<span style="color:var(--mut)"><b>↓ ${fmtH(e.t)}</b> · ${e.y.toFixed(1)}m</span>`).join('')}
  </div>`;
  const winList = windows.length? `<div style="margin-top:10px"><div class="subh" style="margin-bottom:4px">Fenêtres idéales</div>${windows.map(w=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12.5px"><span><b style="color:var(--gold)">${esc(w.esp)}</b> <span style="color:var(--mut)">— ${esc(w.why)}</span></span><span style="font-weight:700;color:var(--txt)">${fmtH(w.from)}—${fmtH(w.to)}</span></div>`).join('')}</div>`:'';

  return `<div class="tidew">${nav}${chart}${facts}${winList}
    <div style="margin-top:10px;font-size:10.5px;color:var(--mut);font-style:italic">Modélisation simplifiée · vérifier <a href="https://tide736.net/" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none">tide736.net</a> la veille.</div>
  </div>`;
}
function setTideDate(destCode, dateStr){
  view.tideDate = view.tideDate||{};
  view.tideDate[destCode] = dateStr;
  render();
}

function addQRFile(ev){
  const f=ev.target.files[0]; if(!f) return;
  const img=new Image(); const rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
    const M=900, k=Math.min(1, M/Math.max(img.width,img.height));
    const cv=document.createElement('canvas'); cv.width=img.width*k; cv.height=img.height*k;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    const data=cv.toDataURL('image/jpeg',0.82);
    const l=prompt('Nom du billet / QR :','Shinkansen'); if(l===null) return;
    let day=prompt('Jour du voyage (1-37, vide = aucun) :',''); day=day?(+day-1):null;
    if(day!==null&&(isNaN(day)||day<0||day>36)) day=null;
    qrs.push({l:l||'QR', day, img:data}); saveQR(); render();
  }; img.src=rd.result; };
  rd.readAsDataURL(f); ev.target.value='';
}

function iconSVG(e,px){ const p=ICONP[e]; if(!p) return null; const sz=px?('width="'+px+'" height="'+px+'"'):'width="1.1em" height="1.1em" style="vertical-align:-.18em"'; return '<svg '+sz+' viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>'; }
function stepIcon(e){ return iconSVG(e,19) || esc(e); }
const EMOJI_RE = new RegExp('('+Object.keys(ICONP).sort((a,b)=>b.length-a.length).join('|')+')','g');
function iconifyEl(root){ if(!root) return; const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null); const list=[]; let n; while(n=w.nextNode()){ EMOJI_RE.lastIndex=0; const par=n.parentNode; if(par && par.closest && par.closest("svg")) continue; if(EMOJI_RE.test(n.nodeValue)) list.push(n); } list.forEach(node=>{ const parent=node.parentNode; if(!parent) return; const s=node.nodeValue; const frag=document.createDocumentFragment(); let last=0,m; EMOJI_RE.lastIndex=0; while(m=EMOJI_RE.exec(s)){ if(m.index>last) frag.appendChild(document.createTextNode(s.slice(last,m.index))); const span=document.createElement("span"); span.className="eico"; span.innerHTML=iconSVG(m[0],null)||m[0]; frag.appendChild(span); last=m.index+m[0].length; } if(last<s.length) frag.appendChild(document.createTextNode(s.slice(last))); parent.replaceChild(frag,node); }); }

function daySteps(i){ const s=(state.dayplan||{})[i]; return s!==undefined ? s : DAYPLAN[i].map(x=>({i:x[0],t:x[1]})); }
function ownSteps(i){ if(!state.dayplan) state.dayplan={}; if(!state.dayplan[i]) state.dayplan[i]=DAYPLAN[i].map(x=>({i:x[0],t:x[1]})); return state.dayplan[i]; }
function editStep(i,j){ const st=ownSteps(i); const v=prompt('Étape :',st[j].t); if(v===null) return; if(v.trim()==='') st.splice(j,1); else st[j].t=v; scheduleSave(); render(); }
function addStep(i){ const ic=prompt('Icône (emoji) :','🚆'); if(ic===null) return; const t=prompt('Texte :',''); if(t===null||!t.trim()) return; ownSteps(i).push({i:ic||'·',t:t.trim()}); scheduleSave(); render(); }
function stepInfoVal(i,j){ return ((state.stepinfo||{})[i+'_'+j])||''; }
function setStepInfo(i,j,v){ state.stepinfo=state.stepinfo||{}; state.stepinfo[i+'_'+j]=v; scheduleSave(); }
let _qrDayTarget=null;
function openStepInfo(i,j){
  const st=ownSteps(i)[j]; if(!st) return;
  const related = qrs.map((q,qi)=>({q,qi})).filter(x=>x.q.day===i);
  const ov=document.createElement('div'); ov.id='capov';
  ov.innerHTML = `<div class="sheet">
    <span class="em">${esc(st.i)}</span><h3>${esc(st.t)}</h3>
    <label class="f">Détails (horaires précis, quai, siège...)</label>
    <textarea rows="4" id="stepinfo_ta" placeholder="Numéro de train, quai, siège...">${esc(stepInfoVal(i,j))}</textarea>
    <div class="sec" style="margin-top:14px">🎫 Billets liés à ce jour <span class="cnt">${related.length}</span></div>
    ${related.length?`<div class="qrgrid">${related.map(x=>`<div class="qrit" onclick="showQR(${x.qi})"><img src="${x.q.img}" alt="${esc(x.q.l)}"><div class="ql">${esc(x.q.l)}</div></div>`).join('')}</div>`:'<div class="empty">Aucun billet pour ce jour</div>'}
    <button class="gpsbtn" style="width:100%;margin-top:10px" onclick="_qrDayTarget=${i};document.getElementById('stepqrf').click()">📷 Ajouter un billet pour ce jour</button>
    <input type="file" id="stepqrf" accept="image/*" style="display:none" onchange="addQRFileForStep(event)">
    <div class="addrow" style="margin-top:14px">
      <button class="cta" style="flex:1;padding:12px" onclick="setStepInfo(${i},${j},document.getElementById('stepinfo_ta').value);document.getElementById('capov').remove();flash('Enregistré ✓')">✓ Fermer & enregistrer</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}
function addQRFileForStep(ev){
  const f=ev.target.files[0]; if(!f) return;
  const day=_qrDayTarget;
  const img=new Image(); const rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
    const M=900, k=Math.min(1, M/Math.max(img.width,img.height));
    const cv=document.createElement('canvas'); cv.width=img.width*k; cv.height=img.height*k;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    const data=cv.toDataURL('image/jpeg',0.82);

  }; img.src=rd.result; };
  rd.readAsDataURL(f); ev.target.value='';
}

function poiSections(d, cats, far){
  const items = d.pois.filter(p=>(far?p.f:!p.f));
  if(!items.length) return '';
  return cats.filter(c=>items.some(p=>p.c===c)).map(c=>{
    const it=items.filter(p=>p.c===c);
    const done=it.filter(p=>state.checks[p.id]).length;
    let body='';
    if(c==='🍜 Restaurants'){
      const subs=[...new Set(it.map(p=>p.sc||'🍽️ À découvrir'))].sort();
      body+=subs.map(s=>`<div class="subh">${esc(s)}</div>`+it.filter(p=>(p.sc||'🍽️ À découvrir')===s).map(poiRow).join('')).join('');

    return `<div class="sec">${esc(c)} <span class="cnt">${done}/${it.length}</span></div>`+body;

}

function readPhoto(file, cb){
  const img=new Image(); const rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
    const M=1000, k=Math.min(1, M/Math.max(img.width,img.height));
    const cv=document.createElement('canvas'); cv.width=img.width*k; cv.height=img.height*k;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    cb(cv.toDataURL('image/jpeg',0.82));
  }; img.src=rd.result; };
  rd.readAsDataURL(file);
}

function confirmCatch(esp, editRef){
  const g=id=>document.getElementById(id)?.value.trim()||'';
  const thumb=document.getElementById('cap_thumb');
  const photo = thumb && thumb.dataset.data ? thumb.dataset.data : (editRef ? (findCatch(editRef)||{}).c?.photo : null);
  const sel=document.getElementById('cap_sessel');
  let sessId = sel ? sel.value : (state.activeSession || '__standalone__');
  const gps=g('cap_gps');
  const data={esp,tl:g('cap_tl'),lr:g('cap_lr'),gps,photo:photo||null,zone:zoneLabel(gps)};
  if(editRef){
    const changed = String(sessId)!==String(editRef.sessId) && sessId!=='__new__';
    if(changed){
      // retirer de la source (session ou hors-session)
      if(editRef.sessId==='__standalone__') (state.catches||[]).splice(editRef.idx,1);
      else { const s=(state.sessions||[]).find(x=>x.id===editRef.sessId); if(s) s.catches.splice(editRef.idx,1); }

      if(sessId==='__standalone__'){ state.catches=state.catches||[]; state.catches.unshift(Object.assign({d:new Date().toISOString()},data)); }

      else { const s=(state.sessions||[]).find(x=>x.id===editRef.sessId); if(s) Object.assign(s.catches[editRef.idx], data); }
    }

    if(sessId==='__new__'){ startSession(); sessId=state.activeSession; }
    if(sessId==='__standalone__'){ state.catches=state.catches||[]; state.catches.unshift(Object.assign({d:new Date().toISOString()},data)); }
    else { const s=(state.sessions||[]).find(x=>String(x.id)===String(sessId)); if(s) s.catches.unshift(Object.assign({d:new Date().toISOString(),spot:s.spot},data)); }

}

  budgetAcct().items.unshift({d:new Date().toISOString(),y,c:document.getElementById('bc').value,n:document.getElementById('bn').value.trim()});
  scheduleSave(); render();
}

const VOLS_DEFAULT = [
 {route:'CDG → HND', detail:'JAL046 · 17:20 → HND (+1)', date:'31 oct'},
 {route:'Retour · HND → CDG', detail:'JL045 · décollage 08:25', date:'6 déc'}
];
function volList(){ if(!state.vols) state.vols = VOLS_DEFAULT.map(v=>({...v})); return state.vols; }
function editVol(i){ const v=volList()[i]; const route=prompt('Route :',v.route); if(route===null) return; const detail=prompt('Détail (n° vol, horaires, siège) :',v.detail); if(detail===null) return; const date=prompt('Date :',v.date); if(date===null) return; v.route=route;v.detail=detail;v.date=date; scheduleSave(); render(); }
const CONTACTS_DEFAULT = [
 {name:'Yuda · Madness', detail:'RDV Sunsun 2/11', tel:''},
 {name:'Iriyado · ryokan', detail:'check-in 15:00', tel:''}
];
function contactList(){ if(!state.contactsList) state.contactsList = CONTACTS_DEFAULT.map(c=>({...c})); return state.contactsList; }
function editContact(i){ const c=contactList()[i]; const name=prompt('Nom :',c.name); if(name===null) return; const detail=prompt('Détail :',c.detail); if(detail===null) return; const tel=prompt('Téléphone (optionnel) :',c.tel||''); if(tel===null) return; c.name=name;c.detail=detail;c.tel=tel.trim(); scheduleSave(); render(); }
function addContact(){ contactList().push({name:'Nouveau contact',detail:'',tel:''}); scheduleSave(); render(); }
function delContact(i){ contactList().splice(i,1); scheduleSave(); render(); }
function renderVault(){
  const V='VAULT';
  const f=(k,l,r,ph)=>`<label class="f">${l}</label>${ta(V,k,r,ph)}`;
  document.getElementById('main').innerHTML =
   `<button class="back" onclick="goHome()">← Accueil</button>
    <div class="card"><div class="sec">✈️ Vols</div>
      ${volList().map((v,i)=>`<div class="taq" style="cursor:pointer" onclick="editVol(${i})"><div style="display:flex;justify-content:space-between;align-items:baseline"><span class="route" style="font-weight:700">${esc(v.route)}</span><span style="color:var(--blue);font-weight:700;font-size:13px">${esc(v.date)}</span></div><div class="d" style="color:var(--mut)">${esc(v.detail)}</div></div>`).join('')}
    </div>
    <div class="card"><div class="sec">📇 Contacts <span class="cnt" style="cursor:pointer" onclick="addContact()">+ ajouter</span></div>
      ${contactList().map((c,i)=>`<div class="li" style="align-items:flex-start"><div style="flex:1;cursor:pointer" onclick="editContact(${i})"><div style="font-weight:700;font-size:14.5px">${esc(c.name)}</div><div style="color:var(--mut);font-size:12.5px;margin-top:2px">${esc(c.detail)}</div></div>${c.tel?`<a class="hotellink" style="margin:0" href="tel:${esc(c.tel.replace(/\s/g,''))}">Appeler</a>`:`<button class="nbtn" onclick="editContact(${i})">✎</button>`}<button class="x" onclick="delContact(${i})">✕</button></div>`).join('')}
    </div>
    <div class="card"><div class="sec">🔑 Autres infos clés</div>
      ${f('passeport','Passeport (n°, validité)','1','')}
      ${f('permis','Permis + traduction JAF','1','n°, où est rangée la traduction...')}
      ${f('assurance','Assurance voyage','2','contrat, n° d’assistance 24/7...')}
      ${f('hotelsjp','Adresses hôtels en japonais (taxi)','4','coller ici les adresses 日本語...')}
      <div class="sec" style="margin-top:18px">🚨 Urgences Japon</div>
      <div class="brief">Police : <b>110</b> · Pompiers / ambulance : <b>119</b> · Garde-côtes (mer) : <b>118</b> · Japan Visitor Hotline (24/7, EN) : <b>050-3816-2787</b></div>
    </div>
    <div class="card"><div class="sec">🗣️ Phrases utiles</div>
      ${Object.keys(PHRASES).map(s=>`<div class="subh" style="margin-top:14px">${s}</div>`+PHRASES[s].map(p=>`<div class="phr"><div class="jp">${p[0]}</div><div class="ro">${p[1]}</div><div class="fr">${p[2]}</div></div>`).join('')).join('')}
    </div>`;
}

function renderSearch(){
  const q=view.q.trim().toLowerCase();
  let rows=[];
  DATA.forEach(d=>d.pois.forEach(p=>{ if((p.t+' '+p.n+' '+d.label).toLowerCase().includes(q)) rows.push({d,p}); }));
  document.getElementById('main').innerHTML =
    `<button class="back" onclick="goHome()">← Accueil</button>
     <div class="card"><input id="search2" value="${esc(view.q)}" placeholder="🔎 Rechercher..." oninput="doSearch(this.value)" style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:11px 12px;font-size:15px;outline:none;font-family:inherit"></div>
     <div class="card"><h2>${rows.length} résultat${rows.length>1?'s':''}</h2>`+
    (rows.length?rows.slice(0,80).map(r=>`<div class="sec" style="cursor:pointer" onclick="openDest('${r.d.code}')">${esc(r.d.label)} › <span class="cnt">${esc(r.p.c)}</span></div>`+poiRow(r.p)).join(''):'<div class="empty">Rien trouvé</div>')+`</div>`;
}

const FOOTER_PAGES = ['home','prep','gear','catch','budget','vault','qr','save'];
function updateFooterActive(){
  const p = view.page==='dest' ? '' : view.page;
  document.querySelectorAll('footer button').forEach((b,i)=>{
    const active = FOOTER_PAGES[i]===p;
    b.style.color = active? 'var(--red2)' : 'var(--navoff)';
    const s=b.querySelector('small'); if(s) s.style.color = active? 'var(--red2)':'var(--navoff)';
  });
}
function render(){
  document.getElementById('jj').textContent = jjLabel();
  const p=view.page;
  if(p==='search') renderSearch();
  else if(p==='dest') renderDest();
  else if(p==='gear') renderGear();
  else if(p==='prep') renderPrep();
  else if(p==='catch') renderCatch();
  else if(p==='budget') renderBudget();
  else if(p==='vault') renderVault();
  else if(p==='qr') renderQR();
  else if(p==='save') renderSave();
  else renderHome();
  updateFooterActive();
  iconifyEl(document.body);
}
function exportJSON(){
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({state,qrs},null,1)],{type:'application/json'})); a.download='carnet_japon_sauvegarde.json'; a.click();
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const j=JSON.parse(r.result); if(j.state){ state=Object.assign(state,j.state); if(j.qrs) { qrs=j.qrs; saveQR(); } } else state=Object.assign(state,j); scheduleSave(); render(); flash('Importé ✓'); }catch(e){ flash('⚠ Fichier invalide'); } };
  r.readAsText(f);
}
if ('serviceWorker' in navigator && location.protocol==='https:') { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
window.addEventListener('popstate', e=>{
  if(e.state && e.state.view) view = e.state.view;
  else view = {page:'home', dest:null, q:'', pd:view.pd};
  render();
});
(async()=>{
  await loadState(); await loadQR();
  history.replaceState({view:{...view}}, '', location.pathname);
  render();
})();
</script>
